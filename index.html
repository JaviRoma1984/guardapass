<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#059669">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GuardaPass">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="/guardapass/icons/icon-192x192.png">
    <link rel="manifest" href="/guardapass/manifest.json">
    <title>GuardaPass - Gestor de Contraseñas</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Pantalla Principal -->
        <div id="main-screen" class="screen active">
            <div class="welcome-section">
                <div class="welcome-icon">
                    <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        <circle cx="12" cy="16" r="1"></circle>
                    </svg>
                </div>
                <h2>GuardaPass</h2>
                <p>Gestiona tus contraseñas de forma segura</p>
            </div>
            <div class="action-buttons">
                <button id="create-btn" class="btn-main btn-create" title="Crear una nueva entrada">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    <span>Crear Nueva</span>
                </button>
                <button id="list-btn" class="btn-main btn-list" title="Ver todas las entradas">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="8" y1="6" x2="21" y2="6"></line>
                        <line x1="8" y1="12" x2="21" y2="12"></line>
                        <line x1="8" y1="18" x2="21" y2="18"></line>
                        <line x1="3" y1="6" x2="3.01" y2="6"></line>
                        <line x1="3" y1="12" x2="3.01" y2="12"></line>
                        <line x1="3" y1="18" x2="3.01" y2="18"></line>
                    </svg>
                    <span>Agenda</span>
                </button>
            </div>
        </div>

        <!-- El resto del HTML se mantiene igual que antes -->
    </div>
    <script src="app.js"></script>
</body>
</html>
